name: PR Review Summary

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate PR summary
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: python -m src.main ${{ github.event.pull_request.base.ref }}

      - name: Post summary as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('pr_summary.json', 'utf8'));

            const riskBadge = {
              low: '🟢 Low',
              medium: '🟡 Medium',
              high: '🔴 High'
            };

            const fileChanges = summary.what_changed
              .map(f => `| \`${f.file_path}\` | ${f.change_type} | ${f.summary} |`)
              .join('\n');

            const testingSuggestions = summary.testing_suggestions
              .map(s => `- [ ] ${s}`)
              .join('\n');

            const reviewers = summary.suggested_reviewers
              .map(r => `- ${r}`)
              .join('\n');

            const body = `## ${summary.title}

            ### What Changed

            | File | Type | Summary |
            |------|------|---------|
            ${fileChanges}

            ### Why It Matters

            ${summary.why_it_matters}

            ### Risk Assessment: ${riskBadge[summary.risk_level] || summary.risk_level}

            ${summary.risk_reasoning}

            ### Testing Checklist

            ${testingSuggestions}

            ### Suggested Reviewers

            ${reviewers}

            ---
            *Generated by [PR Review Summarizer](https://github.com/cloudbuckle-community/strands-ai-functions) using Strands AI Functions*`
              .split('\n')
              .map(line => line.trim())
              .join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
